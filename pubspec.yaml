name: polaris_radar
description: >
  A highly customizable Flutter radar chart with per-dataset dashed borders,
  custom vertex markers (circle/square/diamond/triangle), and implicit animations.
version: 1.0.1
homepage: https://github.com/JasonXZJ/polaris_radar
repository: https://github.com/JasonXZJ/polaris_radar
issue_tracker: https://github.com/JasonXZJ/polaris_radar/issues
topics:
  - radar-chart
  - flutter
  - chart
  - data-visualization

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  # No assets or fonts needed — pure code library.
